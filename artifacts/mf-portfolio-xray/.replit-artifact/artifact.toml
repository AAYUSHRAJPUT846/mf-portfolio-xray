kind = "web"
previewPath = "/"
title = "MF Portfolio X-Ray"
version = "1.0.0"
id = "artifacts/mf-portfolio-xray"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20300

[services.development]
run = "pnpm --filter @workspace/mf-portfolio-xray run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mf-portfolio-xray", "run", "build" ]
publicDir = "artifacts/mf-portfolio-xray/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20300"
BASE_PATH = "/"
